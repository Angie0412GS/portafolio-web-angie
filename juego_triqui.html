<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triqui (Tic-Tac-Toe) - Angie Gonzalez</title>
    <link rel="icon" href="aprendices/LOGO1.png" type="image/x-icon">

    <link rel="stylesheet" href="css/estilos.css"> <link rel="stylesheet" href="css/juego_triqui.css"> </head>
<body>

    <header>
            <nav class="navbar">
                <div class="logo">Angie Gonzalez</div>
                <ul class="nav-links" id="nav-links">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="portafolio.html">Portafolio</a></li>
                    <li><a href="actividades.html">Actividades</a></li>
                    <li><a href="juegos.html">Juegos</a></li>
                    <li><a href="aprendices.html">Aprendices</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
                <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menú">☰</button>
            </nav>
    </header>


    <main class="contenido-principal">
        <section class="seccion">
            <h1 class="titulo-seccion">Triqui</h1>
            <p class="texto-sobre" style="text-align: center; max-width: 700px; margin: 0 auto 30px;">¡Juega al clásico Triqui! Dos jugadores, X y O, compiten por hacer una línea de tres.</p>
            
            <div class="contenedor-juego-individual triqui-contenedor">
                <div id="mensajeTurno" class="mensaje-juego">Turno del jugador: <span id="turnoActual">X</span></div>
                <div class="tablero-triqui" id="tablero">
                    <div class="celda" data-celda-indice="0"></div>
                    <div class="celda" data-celda-indice="1"></div>
                    <div class="celda" data-celda-indice="2"></div>
                    <div class="celda" data-celda-indice="3"></div>
                    <div class="celda" data-celda-indice="4"></div>
                    <div class="celda" data-celda-indice="5"></div>
                    <div class="celda" data-celda-indice="6"></div>
                    <div class="celda" data-celda-indice="7"></div>
                    <div class="celda" data-celda-indice="8"></div>
                </div>
                <div id="resultadoJuegoTriqui" class="resultado-juego"></div>
                <button id="reiniciarTriquiBtn" class="btn-juego oculto">Jugar de Nuevo</button>
            </div>

            <div style="text-align: center; margin-top: 40px;">
                <a href="juegos.html" class="btn-interactivo">Volver a Juegos</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Angie Gonzalez. Todos los derechos reservados.</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/juego_triqui.js"></script> <script src="https://kit.fontawesome.com/tu_kit_fontawesome.js" crossorigin="anonymous"></script>
</body>
</html>
